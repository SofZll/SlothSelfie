<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <button id="backToHome" class="btn btn-secondary">Back to Home</button>
        <h1 class="mb-3">Your Projects:</h1>
        <ul id="projects-list" class="list-group mt-3"></ul>

    <button id="closeProjectViewBtn" class="btn btn-danger" style="display: none;">Close</button>
    <div id="project-view-container" class="mt-4"></div>
    
    <button id="ToggleFormBtn" class="btn btn-primary"> + Add a Project</button>
    <form id="projectForm" style="display: none;">
        <h2 class="mb-3" id="formTitle">Create a new project:</h2>

        <div class="mb-3">
            <label class="form-label">Project name</label>
            <input type="text" class="form-control" id="projectName" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Project owner (username)</label>
            <input type="text" class="form-control" id="projectOwner" required readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="projectDesc"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Members (comma separated)</label>
            <input type="text" class="form-control" id="projectActors">
        </div>

        <div id="phasesContainer">
            <h4>Phases</h4>
        </div>
        <button type="button" class="btn btn-secondary mt-2" onclick="addPhase()">Add a phase</button>

        <button type="submit" class="btn btn-primary mt-2" id="createSave">Create project</button>
    </form>

    </div>

    <script src="./projects.js"></script>
</body>
</html>
