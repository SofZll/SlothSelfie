<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="projects.css">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!--frappe-gantt -->
    <script src="/dist/frappe-gantt.umd.js"></script>
    <link rel="stylesheet" href="dist/frappe-gantt.css">

</head>
<body>
    <div class="container-projects">
        <h2 class="mb-3">Your Projects:</h2>
        <ul id="projects-list" class="list-group mt-3"></ul>

        <button type="button" aria-label="Close-view" id="closeProjectViewBtn" class="btn btn-primary btn-view" style="display: none;">Close View</button>
        <div id="project-view-container" class="mt-4"></div>

        <div class="m-3">
            <button type="button" aria-label="Close-activities" id="closeActivityViewBtn" class="btn btn-warning btn-form-3" style="display: none;">Close Activities</button>
        </div>
        <div id="activity-container"></div>
        
        <button type="button" aria-label="AddProject-CloseForm" id="ToggleFormBtn" class="btn"> + Add a Project</button>
        <form id="projectForm" style="display: none;">
            <h3 class="mb-3" id="formTitle">Create a new project:</h3>

            <div class="mb-3">
                <label class="form-label">Project name</label>
                <input type="text" class="form-control" id="projectName" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Project owner (username)</label>
                <input type="text" class="form-control" id="projectOwner" required readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="projectDesc"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Members (comma separated)</label>
                <input type="text" class="form-control" id="projectActors" required>
            </div>

            <div id="phasesContainer">
                <h4>Phases</h4>
            </div>
            <button type="button" aria-label="Add-phase" class="btn btn-primary mt-2 btn-form" onclick="addPhase()">Add a phase</button>

            <div id="alertMessage" style="display: none;">
                Saving...
            </div>

            <button type="submit" aria-label="CreateSave-project" class="btn btn-primary mt-2 btn-form" id="createSave">Create project</button>
        </form>
    </div>

    <script src="./projects.js"></script>
    <script src="./projectsView.js"></script>
    <script src="./projectsHandleActivities.js"></script>
    <script src="./projectsHandleActivitiesUtils.js"></script>
</body>
</html>
